<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/skytek-design-system-fda4f434-27a8-4d78-8fa7-92ccd315175d/styles.css">
<script src="_ds/skytek-design-system-fda4f434-27a8-4d78-8fa7-92ccd315175d/_ds_bundle.js"></script>
<style>
  html, body { margin:0; padding:0; }
  .lg-link { color:var(--brand-500); text-decoration:none; font-weight:600; }
  .lg-link:hover { text-decoration:underline; color:var(--brand-400); }
  .lg-input { width:100%; height:46px; border:1px solid rgba(255,255,255,0.14); border-radius:5px; background:rgba(228,233,243,0.92); padding:0 14px; font-size:14px; font-family:var(--font-sans); color:var(--slate-800); outline:0; transition:box-shadow .15s ease, border-color .15s ease; }
  .lg-input::placeholder { color:var(--slate-400); }
  .lg-input:focus { border-color:var(--brand-500); box-shadow:var(--shadow-focus); }
  @keyframes lg-pulse { 0%,100% { opacity:.5; } 50% { opacity:1; } }
</style>
</helmet>
<div style="position:relative; min-height:100vh; display:grid; place-items:center; background:#050912 url('images/cyber-hub-login-bg.jpg') center/cover no-repeat; font-family:var(--font-sans); overflow:hidden;">

  <!-- darkening + vignette overlay for card readability -->
  <div style="position:absolute; inset:0; background:radial-gradient(ellipse 80% 75% at 50% 40%, rgba(5,9,18,0.45) 0%, rgba(5,9,18,0.62) 55%, rgba(3,6,16,0.86) 100%); pointer-events:none;"></div>

  <!-- Login card -->
  <div style="position:relative; z-index:2; width:min(92vw,480px); background:rgba(18,28,52,0.55); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.13); border-radius:6px; box-shadow:0 30px 70px -20px rgba(0,0,0,0.7); padding:38px 40px 34px;">

    <!-- brand -->
    <div style="display:flex; align-items:center; justify-content:center; margin-bottom:22px;">
      <img src="images/skytek-cyber-hub-logo-white-landscape.png" alt="Cyber Hub — powered by Skytek" style="width:260px; max-width:80%; height:auto; display:block;">
    </div>

    <h1 style="margin:0 0 8px; text-align:center; font-family:var(--font-display); font-size:28px; font-weight:700; letter-spacing:.06em; color:#fff;">LOGIN</h1>
    <p style="margin:0 0 26px; text-align:center; font-size:14px; color:#aeb9cf;">Not a member? <a href="#" class="lg-link">Register now</a></p>

    <form action="Dashboard.html" method="get" style="display:flex; flex-direction:column; gap:18px;">
      <div>
        <label for="lg-user" style="display:block; font-size:13px; font-weight:700; color:#eef2f9; margin-bottom:7px;">Username</label>
        <input id="lg-user" name="user" type="text" class="lg-input" placeholder="Enter your username" autocomplete="username">
      </div>
      <div>
        <label for="lg-pass" style="display:block; font-size:13px; font-weight:700; color:#eef2f9; margin-bottom:7px;">Password</label>
        <input id="lg-pass" name="pass" type="password" class="lg-input" placeholder="Enter your password" autocomplete="current-password">
      </div>

      <button type="submit" class="ds-btn ds-btn--primary" style="width:100%; height:48px; font-size:15px; font-weight:700; letter-spacing:.04em; margin-top:4px;">LOGIN</button>

      <div style="display:flex; align-items:center; justify-content:space-between; margin-top:2px;">
        <label style="display:flex; align-items:center; gap:9px; font-size:13px; color:#dbe4f4; cursor:pointer;">
          <input type="checkbox" class="ds-check"> Remember Me
        </label>
        <a href="#" class="lg-link" style="font-weight:600;">Forgot Password?</a>
      </div>
    </form>
  </div>

  <!-- skytek corner logo -->
  <div style="position:absolute; left:26px; bottom:22px; z-index:2;">
    <img src="images/skytek_logo_landscape_colour_white_tag.png" alt="skytek — Space to Innovate" style="height:42px; width:auto; display:block;">
  </div>
</div>
</x-dc>
</body>
</html>
